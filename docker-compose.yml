version: "3.9"

services:
  synergy-ui:
    container_name: synergy-ui
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - APP_BUILD_HASH=dev-docker
    command: >
      sh -c "pnpm install &&
             pnpm run build &&
             pnpm run preview"

  # Optional: Python FastAPI backend if needed later
  # 